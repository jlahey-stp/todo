<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weekly To-Do</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300..700&display=swap" rel="stylesheet">
  <style>
    :root, [data-theme="light"] {
      --color-bg: #f7f6f2;
      --color-surface: #f9f8f5;
      --color-surface-2: #fbfbf9;
      --color-surface-offset: #f3f0ec;
      --color-surface-dynamic: #e6e4df;
      --color-divider: #dcd9d5;
      --color-border: #d4d1ca;
      --color-text: #28251d;
      --color-text-muted: #7a7974;
      --color-text-faint: #bab9b4;
      --color-primary: #01696f;
      --color-primary-hover: #0c4e54;
      --color-primary-active: #0f3638;
      --color-primary-highlight: #cedcd8;
      --color-error: #a12c7b;
      --color-error-highlight: #e0ced7;
      --color-success: #437a22;
      --color-success-highlight: #d4dfcc;
      --color-warning: #964219;
      --color-warning-highlight: #ddcfc6;
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 2px oklch(0.2 0.01 80 / 0.06);
      --shadow-md: 0 4px 12px oklch(0.2 0.01 80 / 0.09);
      --shadow-lg: 0 12px 32px oklch(0.2 0.01 80 / 0.12);
      --transition: 180ms cubic-bezier(0.16, 1, 0.3, 1);
      --space-1:.25rem;--space-2:.5rem;--space-3:.75rem;--space-4:1rem;
      --space-5:1.25rem;--space-6:1.5rem;--space-8:2rem;--space-10:2.5rem;
      --space-12:3rem;--space-16:4rem;
      --text-xs:clamp(0.75rem,0.7rem + 0.25vw,0.875rem);
      --text-sm:clamp(0.875rem,0.8rem + 0.35vw,1rem);
      --text-base:clamp(1rem,0.95rem + 0.25vw,1.125rem);
      --text-lg:clamp(1.125rem,1rem + 0.75vw,1.5rem);
      --text-xl:clamp(1.5rem,1.2rem + 1.25vw,2.25rem);
      --font-body:'Inter','Helvetica Neue',sans-serif;
    }
    [data-theme="dark"] {
      --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
      --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
      --color-divider:#262523;--color-border:#393836;
      --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
      --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-active:#1a626b;
      --color-primary-highlight:#313b3b;--color-error:#d163a7;--color-error-highlight:#4c3d46;
      --color-success:#6daa45;--color-success-highlight:#3a4435;
      --color-warning:#bb653b;--color-warning-highlight:#564942;
      --shadow-sm:0 1px 2px oklch(0 0 0/.2);--shadow-md:0 4px 12px oklch(0 0 0/.3);
      --shadow-lg:0 12px 32px oklch(0 0 0/.4);
    }
    @media(prefers-color-scheme:dark){:root:not([data-theme]){
      --color-bg:#171614;--color-surface:#1c1b19;--color-surface-2:#201f1d;
      --color-surface-offset:#1d1c1a;--color-surface-dynamic:#2d2c2a;
      --color-divider:#262523;--color-border:#393836;
      --color-text:#cdccca;--color-text-muted:#797876;--color-text-faint:#5a5957;
      --color-primary:#4f98a3;--color-primary-hover:#227f8b;--color-primary-active:#1a626b;
      --color-primary-highlight:#313b3b;--color-error:#d163a7;--color-error-highlight:#4c3d46;
      --color-success:#6daa45;--color-success-highlight:#3a4435;
      --color-warning:#bb653b;--color-warning-highlight:#564942;
      --shadow-sm:0 1px 2px oklch(0 0 0/.2);--shadow-md:0 4px 12px oklch(0 0 0/.3);
    }}

    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    html{-webkit-font-smoothing:antialiased;scroll-behavior:smooth;}
    body{min-height:100dvh;font-family:var(--font-body);font-size:var(--text-base);color:var(--color-text);background:var(--color-bg);line-height:1.6;}
    input,button,textarea,select{font:inherit;color:inherit;}
    button{cursor:pointer;background:none;border:none;}
    :focus-visible{outline:2px solid var(--color-primary);outline-offset:3px;border-radius:var(--radius-sm);}
    @media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:0.01ms!important;transition-duration:0.01ms!important;}}

    /* ===== LAYOUT ===== */
    .app { max-width: 1320px; margin-inline: auto; padding: var(--space-6) var(--space-4) var(--space-12); }

    /* ===== HEADER ===== */
    .header { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--space-8); flex-wrap:wrap; gap:var(--space-4); }
    .logo { display:flex; align-items:center; gap:var(--space-3); }
    .logo-title { font-size:var(--text-xl); font-weight:700; letter-spacing:-0.02em; line-height:1.1; }
    .logo-sub { font-size:var(--text-xs); color:var(--color-text-muted); margin-top:2px; }
    .header-right { display:flex; align-items:center; gap:var(--space-3); }

    /* Week nav */
    .week-nav { display:flex; align-items:center; gap:var(--space-2); }
    .week-label { font-size:var(--text-sm); font-weight:600; color:var(--color-text); min-width:160px; text-align:center; }
    .week-btn { display:flex; align-items:center; justify-content:center; width:32px; height:32px; border-radius:var(--radius-full); color:var(--color-text-muted); border:1px solid oklch(from var(--color-text) l c h/.12); transition:color var(--transition),background var(--transition),border-color var(--transition); }
    .week-btn:hover { color:var(--color-text); background:var(--color-surface-offset); }
    .today-btn { font-size:var(--text-xs); font-weight:600; padding:var(--space-2) var(--space-3); border-radius:var(--radius-full); color:var(--color-primary); border:1px solid oklch(from var(--color-primary) l c h/.3); transition:background var(--transition),border-color var(--transition); }
    .today-btn:hover { background:var(--color-primary-highlight); }

    /* Theme toggle */
    .theme-toggle { display:flex; align-items:center; justify-content:center; width:36px; height:36px; border-radius:var(--radius-full); color:var(--color-text-muted); transition:color var(--transition),background var(--transition); }
    .theme-toggle:hover { color:var(--color-text); background:var(--color-surface-offset); }

    /* ===== WEEK SUMMARY ===== */
    .week-summary { display:flex; gap:var(--space-4); margin-bottom:var(--space-6); padding:var(--space-4) var(--space-5); background:var(--color-surface); border:1px solid oklch(from var(--color-text) l c h/.08); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); }
    .summary-stat { display:flex; flex-direction:column; flex:1; }
    .summary-val { font-size:var(--text-lg); font-weight:700; line-height:1.1; font-variant-numeric:tabular-nums; }
    .summary-val.done { color:var(--color-success); }
    .summary-val.pct  { color:var(--color-primary); }
    .summary-label { font-size:var(--text-xs); color:var(--color-text-muted); }
    .summary-divider { width:1px; background:var(--color-divider); }
    .week-progress-bar { height:4px; background:var(--color-surface-dynamic); border-radius:var(--radius-full); overflow:hidden; margin-top:var(--space-3); }
    .week-progress-fill { height:100%; background:var(--color-primary); border-radius:var(--radius-full); transition:width 400ms cubic-bezier(0.16,1,0.3,1); }

    /* ===== DAY GRID ===== */
    .day-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:var(--space-3); align-items:start; }
    @media(max-width:1100px){.day-grid{grid-template-columns:repeat(4,1fr);}}
    @media(max-width:700px){.day-grid{grid-template-columns:repeat(2,1fr);}}
    @media(max-width:420px){.day-grid{grid-template-columns:1fr;}}

    /* ===== DAY COLUMN ===== */
    .day-col { display:flex; flex-direction:column; gap:var(--space-2); }

    .day-header { display:flex; align-items:center; justify-content:space-between; padding:var(--space-3) var(--space-4); background:var(--color-surface); border:1px solid oklch(from var(--color-text) l c h/.08); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); }
    .day-col.is-today .day-header { background:var(--color-primary); border-color:var(--color-primary); box-shadow:var(--shadow-md); }
    .day-col.is-today .day-name { color:#fff; }
    .day-col.is-today .day-num { color:rgba(255,255,255,0.8); }
    .day-col.is-today .day-count { background:rgba(255,255,255,0.2); color:#fff; }
    .day-col.is-past .day-header { opacity:0.65; }

    .day-name { font-size:var(--text-sm); font-weight:700; color:var(--color-text); letter-spacing:0.02em; }
    .day-num  { font-size:var(--text-xs); color:var(--color-text-muted); }
    .day-count { font-size:var(--text-xs); font-weight:600; padding:2px 7px; border-radius:var(--radius-full); background:var(--color-surface-offset); color:var(--color-text-muted); font-variant-numeric:tabular-nums; }

    /* Add task mini-form */
    .day-add { display:flex; gap:var(--space-1); }
    .day-input { flex:1; padding:var(--space-2) var(--space-3); background:var(--color-surface); border:1px solid oklch(from var(--color-text) l c h/.1); border-radius:var(--radius-md); font-size:var(--text-xs); color:var(--color-text); transition:border-color var(--transition),box-shadow var(--transition); min-width:0; }
    .day-input::placeholder { color:var(--color-text-faint); }
    .day-input:focus { outline:none; border-color:var(--color-primary); box-shadow:0 0 0 2px oklch(from var(--color-primary) l c h/.15); }
    .day-add-btn { display:flex; align-items:center; justify-content:center; width:30px; height:30px; min-width:30px; background:var(--color-primary); color:#fff; border-radius:var(--radius-md); transition:background var(--transition); }
    .day-add-btn:hover { background:var(--color-primary-hover); }
    .day-add-btn:active { background:var(--color-primary-active); }

    /* Priority select inline */
    .day-pri { padding:var(--space-1) var(--space-2); background:var(--color-surface); border:1px solid oklch(from var(--color-text) l c h/.1); border-radius:var(--radius-md); font-size:var(--text-xs); color:var(--color-text-muted); cursor:pointer; appearance:none; -webkit-appearance:none; }
    .day-pri:focus { outline:none; border-color:var(--color-primary); }

    /* Tasks in a day */
    .day-tasks { display:flex; flex-direction:column; gap:var(--space-1); min-height:40px; }

    .task-item { display:flex; align-items:flex-start; gap:var(--space-2); padding:var(--space-2) var(--space-3); background:var(--color-surface); border:1px solid oklch(from var(--color-text) l c h/.08); border-radius:var(--radius-md); box-shadow:var(--shadow-sm); transition:box-shadow var(--transition),opacity var(--transition); animation:taskIn 220ms cubic-bezier(0.16,1,0.3,1); }
    .task-item:hover { box-shadow:var(--shadow-md); }
    .task-item.completed { opacity:0.5; }
    @keyframes taskIn { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    .task-check { appearance:none; -webkit-appearance:none; width:16px; height:16px; min-width:16px; border:2px solid oklch(from var(--color-text) l c h/.25); border-radius:3px; cursor:pointer; background:var(--color-surface-2); position:relative; margin-top:2px; transition:background var(--transition),border-color var(--transition); }
    .task-check:checked { background:var(--color-primary); border-color:var(--color-primary); }
    .task-check:checked::after { content:''; position:absolute; left:3px; top:0px; width:6px; height:10px; border:2px solid white; border-top:none; border-left:none; transform:rotate(45deg); }
    .task-check:hover { border-color:var(--color-primary); }

    .task-body { flex:1; min-width:0; }
    .task-text { font-size:var(--text-xs); color:var(--color-text); line-height:1.4; word-break:break-word; }
    .task-item.completed .task-text { text-decoration:line-through; color:var(--color-text-muted); }

    .priority-dot { display:inline-block; width:6px; height:6px; border-radius:var(--radius-full); margin-right:4px; vertical-align:middle; flex-shrink:0; margin-top:5px; }
    .dot-high { background:var(--color-error); }
    .dot-medium { background:var(--color-warning); }
    .dot-low { background:var(--color-success); }

    .task-del { display:flex; align-items:center; justify-content:center; width:20px; height:20px; min-width:20px; border-radius:var(--radius-sm); color:var(--color-text-faint); opacity:0; transition:opacity var(--transition),color var(--transition),background var(--transition); }
    .task-item:hover .task-del, .task-item:focus-within .task-del { opacity:1; }
    .task-del:hover { color:var(--color-error); background:var(--color-error-highlight); }

    /* Day progress */
    .day-progress { height:3px; background:var(--color-surface-dynamic); border-radius:var(--radius-full); overflow:hidden; }
    .day-progress-fill { height:100%; background:var(--color-primary); border-radius:var(--radius-full); transition:width 350ms cubic-bezier(0.16,1,0.3,1); }
    .day-col.is-today .day-progress-fill { background:#fff; opacity:0.7; }

    /* Day empty */
    .day-empty { display:flex; align-items:center; justify-content:center; padding:var(--space-4) var(--space-2); color:var(--color-text-faint); font-size:var(--text-xs); text-align:center; border:1px dashed oklch(from var(--color-text) l c h/.1); border-radius:var(--radius-md); }

    /* Day clear link */
    .day-clear { font-size:var(--text-xs); color:var(--color-text-faint); text-align:right; padding:0 var(--space-1); transition:color var(--transition); cursor:pointer; }
    .day-clear:hover { color:var(--color-error); }

    @media(max-width:480px) {
      .week-summary { flex-wrap:wrap; gap:var(--space-3); }
      .week-nav { flex-wrap:wrap; justify-content:center; }
    }
  </style>
</head>
<body>
<main class="app">

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <svg width="36" height="36" viewBox="0 0 36 36" fill="none" aria-label="Weekly To-Do logo">
        <rect width="36" height="36" rx="10" fill="var(--color-primary)"/>
        <rect x="7" y="9" width="22" height="3" rx="1.5" fill="white" opacity="0.9"/>
        <rect x="7" y="14" width="22" height="3" rx="1.5" fill="white" opacity="0.65"/>
        <rect x="7" y="19" width="14" height="3" rx="1.5" fill="white" opacity="0.45"/>
        <path d="M22 22l3 3 5-5" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <div>
        <div class="logo-title">Weekly To-Do</div>
        <div class="logo-sub" id="week-range-sub"></div>
      </div>
    </div>
    <div class="header-right">
      <nav class="week-nav" aria-label="Week navigation">
        <button class="week-btn" id="prev-week" aria-label="Previous week">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <span class="week-label" id="week-label"></span>
        <button class="week-btn" id="next-week" aria-label="Next week">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
        <button class="today-btn" id="today-btn">Today</button>
      </nav>
      <button class="theme-toggle" data-theme-toggle aria-label="Switch theme"></button>
    </div>
  </header>

  <!-- Week Summary -->
  <div class="week-summary">
    <div class="summary-stat"><span class="summary-val" id="sw-total">0</span><span class="summary-label">This week</span></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><span class="summary-val done" id="sw-done">0</span><span class="summary-label">Done</span></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><span class="summary-val" id="sw-remaining">0</span><span class="summary-label">Remaining</span></div>
    <div class="summary-divider"></div>
    <div class="summary-stat"><span class="summary-val pct" id="sw-pct">—</span><span class="summary-label">Complete</span></div>
  </div>
  <div class="week-progress-bar" style="margin-bottom:var(--space-6)">
    <div class="week-progress-fill" id="week-progress" style="width:0%"></div>
  </div>

  <!-- Day Grid -->
  <div class="day-grid" id="day-grid"></div>

</main>

<script>
  const DAYS = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const DAYS_SHORT = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const STORAGE_KEY = 'weekly-todo-v2';

  // tasks: { [dateKey]: [{id, text, priority, done, createdAt}] }
  let allTasks = {};
  let weekOffset = 0; // 0 = current week

  // Storage
  function save() { try { sessionStorage.setItem(STORAGE_KEY, JSON.stringify(allTasks)); } catch(e){} }
  function load() { try { const r = sessionStorage.getItem(STORAGE_KEY); if(r) allTasks = JSON.parse(r); } catch(e){} }

  // Date helpers
  function getMondayOfWeek(date) {
    const d = new Date(date);
    const day = d.getDay(); // 0=Sun
    const diff = (day === 0) ? -6 : 1 - day;
    d.setDate(d.getDate() + diff);
    d.setHours(0,0,0,0);
    return d;
  }
  function dateKey(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function todayKey() { return dateKey(new Date()); }
  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }
  function fmtShort(d) {
    return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  }

  // Get the 7 days of the displayed week (Mon–Sun)
  function getWeekDays() {
    const today = new Date();
    const monday = getMondayOfWeek(today);
    monday.setDate(monday.getDate() + weekOffset * 7);
    return Array.from({length:7}, (_,i) => {
      const d = new Date(monday);
      d.setDate(monday.getDate() + i);
      return d;
    });
  }

  // Theme toggle
  (function(){
    const t = document.querySelector('[data-theme-toggle]');
    const r = document.documentElement;
    let d = matchMedia('(prefers-color-scheme:dark)').matches ? 'dark' : 'light';
    r.setAttribute('data-theme', d);
    function setIcon() {
      t.innerHTML = d==='dark'
        ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>'
        : '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>';
      t.setAttribute('aria-label','Switch to '+(d==='dark'?'light':'dark')+' mode');
    }
    setIcon();
    t.addEventListener('click',()=>{ d=d==='dark'?'light':'dark'; r.setAttribute('data-theme',d); setIcon(); });
  })();

  function escHtml(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function renderWeek() {
    const days = getWeekDays();
    const tKey = todayKey();

    // Header labels
    const monday = days[0], sunday = days[6];
    document.getElementById('week-label').textContent = `${fmtShort(monday)} – ${fmtShort(sunday)}`;
    document.getElementById('week-range-sub').textContent = `Week of ${fmtShort(monday)}`;

    // Week summary
    let wTotal=0, wDone=0;
    days.forEach(d => {
      const k = dateKey(d);
      (allTasks[k]||[]).forEach(t => { wTotal++; if(t.done) wDone++; });
    });
    const wRem = wTotal - wDone;
    const wPct = wTotal > 0 ? Math.round(wDone/wTotal*100) : 0;
    document.getElementById('sw-total').textContent = wTotal;
    document.getElementById('sw-done').textContent = wDone;
    document.getElementById('sw-remaining').textContent = wRem;
    document.getElementById('sw-pct').textContent = wTotal > 0 ? wPct+'%' : '—';
    document.getElementById('week-progress').style.width = wPct+'%';

    // Today button visibility
    document.getElementById('today-btn').style.display = weekOffset === 0 ? 'none' : '';

    // Build grid
    const grid = document.getElementById('day-grid');
    grid.innerHTML = '';

    days.forEach(day => {
      const k = dateKey(day);
      const dayIdx = day.getDay(); // 0=Sun
      const isToday = k === tKey;
      const isPast = day < new Date(new Date().setHours(0,0,0,0));
      const tasks = allTasks[k] || [];
      const done = tasks.filter(t=>t.done).length;
      const pct = tasks.length > 0 ? Math.round(done/tasks.length*100) : 0;

      const col = document.createElement('div');
      col.className = 'day-col' + (isToday?' is-today':'') + (isPast&&!isToday?' is-past':'');
      col.dataset.key = k;

      col.innerHTML = `
        <div class="day-header">
          <div>
            <div class="day-name">${DAYS_SHORT[dayIdx]}</div>
            <div class="day-num">${day.toLocaleDateString('en-US',{month:'short',day:'numeric'})}</div>
          </div>
          <span class="day-count">${tasks.length}</span>
        </div>
        <div class="day-progress"><div class="day-progress-fill" style="width:${pct}%"></div></div>
        <form class="day-add" data-key="${k}" autocomplete="off">
          <input class="day-input" placeholder="Add task…" maxlength="200" aria-label="Add task for ${DAYS[dayIdx]}">
          <select class="day-pri" aria-label="Priority">
            <option value="medium">Med</option>
            <option value="high">High</option>
            <option value="low">Low</option>
          </select>
          <button type="submit" class="day-add-btn" aria-label="Add">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
          </button>
        </form>
        <div class="day-tasks" data-key="${k}">
          ${tasks.length === 0
            ? `<div class="day-empty">No tasks yet</div>`
            : tasks.map(t=>`
              <div class="task-item${t.done?' completed':''}" data-id="${t.id}">
                <span class="priority-dot dot-${t.priority}"></span>
                <input type="checkbox" class="task-check" ${t.done?'checked':''} aria-label="Complete task" data-key="${k}" data-id="${t.id}">
                <div class="task-body"><div class="task-text">${escHtml(t.text)}</div></div>
                <button class="task-del" aria-label="Delete task" data-key="${k}" data-id="${t.id}">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
                </button>
              </div>`).join('')}
        </div>
        ${tasks.some(t=>t.done) ? `<div class="day-clear" data-key="${k}" role="button" tabindex="0" aria-label="Clear completed tasks">Clear done</div>` : ''}
      `;
      grid.appendChild(col);
    });

    // Bind add forms
    grid.querySelectorAll('.day-add').forEach(form => {
      form.addEventListener('submit', e => {
        e.preventDefault();
        const k = form.dataset.key;
        const input = form.querySelector('.day-input');
        const text = input.value.trim();
        if (!text) { input.focus(); return; }
        const priority = form.querySelector('.day-pri').value;
        if (!allTasks[k]) allTasks[k] = [];
        allTasks[k].push({ id:uid(), text, priority, done:false, createdAt:Date.now() });
        input.value = '';
        save();
        renderWeek();
        // Re-focus the input for the same day
        const newForm = document.querySelector(`.day-add[data-key="${k}"]`);
        if(newForm) newForm.querySelector('.day-input').focus();
      });
    });

    // Bind checkboxes
    grid.querySelectorAll('.task-check').forEach(cb => {
      cb.addEventListener('change', () => {
        const k = cb.dataset.key, id = cb.dataset.id;
        allTasks[k] = (allTasks[k]||[]).map(t => t.id===id ? {...t, done:!t.done} : t);
        save(); renderWeek();
      });
    });

    // Bind deletes
    grid.querySelectorAll('.task-del').forEach(btn => {
      btn.addEventListener('click', () => {
        const k = btn.dataset.key, id = btn.dataset.id;
        allTasks[k] = (allTasks[k]||[]).filter(t => t.id !== id);
        save(); renderWeek();
      });
    });

    // Bind clear done
    grid.querySelectorAll('.day-clear').forEach(el => {
      el.addEventListener('click', () => {
        const k = el.dataset.key;
        allTasks[k] = (allTasks[k]||[]).filter(t => !t.done);
        save(); renderWeek();
      });
      el.addEventListener('keydown', e => { if(e.key==='Enter'||e.key===' ') el.click(); });
    });
  }

  // Week navigation
  document.getElementById('prev-week').addEventListener('click', () => { weekOffset--; renderWeek(); });
  document.getElementById('next-week').addEventListener('click', () => { weekOffset++; renderWeek(); });
  document.getElementById('today-btn').addEventListener('click', () => { weekOffset=0; renderWeek(); });

  load();
  renderWeek();
</script>
</body>
</html>
